<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="rail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle glow behind rail -->
  <ellipse cx="256" cy="280" rx="120" ry="160" fill="url(#glow)"/>

  <!-- Rail cross-section (I-beam / railhead profile) -->
  <g transform="translate(256, 256)">
    <!-- Top flange (head) -->
    <rect x="-80" y="-140" width="160" height="40" rx="8" fill="url(#rail)"/>

    <!-- Web (vertical connector) -->
    <rect x="-24" y="-100" width="48" height="160" rx="4" fill="url(#rail)"/>

    <!-- Bottom flange (base) -->
    <rect x="-100" y="60" width="200" height="36" rx="8" fill="url(#rail)"/>

    <!-- Highlight on head -->
    <rect x="-70" y="-134" width="140" height="12" rx="6" fill="white" opacity="0.2"/>

    <!-- Small perspective lines on head to suggest depth -->
    <line x1="-60" y1="-120" x2="60" y2="-120" stroke="white" stroke-opacity="0.1" stroke-width="2"/>
  </g>

  <!-- Subtle track lines at bottom -->
  <line x1="100" y1="380" x2="412" y2="380" stroke="#7c3aed" stroke-opacity="0.15" stroke-width="3"/>
  <line x1="80" y1="396" x2="432" y2="396" stroke="#7c3aed" stroke-opacity="0.1" stroke-width="3"/>
</svg>
